<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ AXUMIT ARCADE · TEMPORAL SURGE ⚡</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0b1120, #020408);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Orbitron', 'Segoe UI', 'Poppins', system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;  /* critical for smooth touch dragging on phones */
    }

    /* glass panel — more futuristic */
    .glass-panel {
      background: rgba(6, 16, 30, 0.75);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 72px;
      border: 1.5px solid rgba(0, 255, 255, 0.45);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 255, 0.15) inset, 0 0 30px #00aaff40;
      padding: 2.6rem 3.2rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #menu, #gameOver {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      text-align: center;
      animation: floatIn 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(-40%) scale(0.9); }
      100% { opacity: 1; transform: translateY(-50%) scale(1); }
    }

    h1 {
      font-size: 3.8rem;
      margin: 0 0 0.6rem;
      background: linear-gradient(145deg, #FFE9B0, #FFD966, #FFAA33, #FFE3A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 4px;
      font-weight: 800;
      text-shadow: 0 0 20px #ffb34780;
      filter: drop-shadow(0 4px 6px #00000050);
    }

    .sub {
      color: #b0e0ff;
      margin-top: -8px;
      margin-bottom: 32px;
      font-weight: 500;
      letter-spacing: 1.5px;
      font-size: 1.2rem;
      text-shadow: 0 0 12px #00b4ff;
    }

    .button-group {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    /* neon buttons */
    button {
      background: linear-gradient(145deg, #142b47, #0a1628);
      border: 1.5px solid #4dc9ff;
      padding: 14px 38px;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 60px;
      color: #e3f2ff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 10px 20px #00000060, 0 0 12px #00c8ff80, inset 0 1px 0 #ffffff30;
      font-family: inherit;
      letter-spacing: 2px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      transform: scale(1);
    }

    button:hover {
      transform: translateY(-4px) scale(1.02);
      background: linear-gradient(145deg, #1e3a5f, #0f1f33);
      border-color: #8ad4ff;
      box-shadow: 0 16px 24px #00000080, 0 0 24px #3ad1ff, inset 0 1px 2px #ffffff80;
      color: white;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 4px 12px #000, 0 0 18px #3ad1ff;
    }

    .btn-secondary {
      background: linear-gradient(145deg, #2a2240, #1a1228);
      border-color: #ffaa66;
      box-shadow: 0 10px 20px #00000060, 0 0 12px #ffb347, inset 0 1px 0 #ffe0b3;
    }

    .btn-secondary:hover {
      background: linear-gradient(145deg, #3e2f5a, #261d38);
      border-color: #ffca8a;
      box-shadow: 0 16px 24px #00000080, 0 0 24px #ffb347, inset 0 1px 2px #fff0d0;
    }

    canvas {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #020617, #000000);
      touch-action: none;
      cursor: none;
    }

    #finalScore {
      font-size: 2.5rem;
      background: rgba(2, 15, 30, 0.8);
      padding: 16px 44px;
      border-radius: 80px;
      margin: 20px 0 28px;
      font-weight: bold;
      color: #FFE28C;
      border: 1px solid #ffbf5e;
      box-shadow: 0 0 30px #ffaa3380, inset 0 1px 3px #ffffff60;
      backdrop-filter: blur(12px);
      letter-spacing: 2px;
    }

    .hint-badge {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #aad0ff;
      font-size: 1rem;
      opacity: 0.8;
      z-index: 100;
      pointer-events: none;
      background: #00000060;
      padding: 6px 16px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid #3cc0ff60;
    }

    .swipe-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: #ffd966;
      font-size: 1rem;
      z-index: 100;
      pointer-events: none;
      background: #00000060;
      padding: 6px 16px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid #ffbb3360;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swipe-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 0 4px #ffaa55);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      .glass-panel { padding: 1.8rem 1.8rem; border-radius: 48px; }
      button { padding: 12px 28px; font-size: 1.2rem; }
      .sub { font-size: 1rem; }
      .hint-badge, .swipe-indicator { font-size: 0.75rem; padding: 4px 12px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="menu" class="glass-panel">
    <h1>⟁ AXUMIT ARCADE ⟁</h1>
    <div class="sub">⚡ SWIPE · DRAG · ARROWS — EVADE CRIMSON ORBS ⚡</div>
    <div class="button-group">
      <button id="startBtn">▶ ENTER SURGE</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="gameOver" class="glass-panel" style="display:none;">
    <h1>☄️ TEMPORAL BREACH ☄️</h1>
    <p id="finalScore"></p>
    <div class="button-group">
      <button id="restartBtn" class="btn-secondary">⟲ REBOOT</button>
      <button id="mainMenuBtn" class="btn-secondary">⌂ NEXUS</button>
    </div>
  </div>

  <div class="hint-badge" id="hintLeft">← →  keys  ·  finger drag/swipe</div>
  <div class="swipe-indicator" id="hintRight">
    <span class="swipe-icon">🖐️ ➡️</span>
    <span>slide to move</span>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const menuDiv = document.getElementById('menu');
      const gameOverDiv = document.getElementById('gameOver');
      const finalScoreSpan = document.getElementById('finalScore');
      const hintLeft = document.getElementById('hintLeft');
      const hintRight = document.getElementById('hintRight');

      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const mainMenuBtn = document.getElementById('mainMenuBtn');

      let gameRunning = false;
      let animationId = null;

      // Player
      let player = { x: 0, y: 0, width: 54, height: 54 };
      let targetX = 0;
      let objects = [];
      let particles = [];
      let score = 0;
      
      // Speed system: increases by 1 every 25 seconds
      let baseSpeed = 2.6;        // starting speed (minimum)
      let speedLevel = 0;         // additional speed from time
      const SPEED_INCREASE_INTERVAL = 25; // seconds
      let gameStartTime = 0;
      let currentSpeedMultiplier = 1.0;

      // control flags for keyboard and enhanced touch/swipe
      let leftPressed = false;
      let rightPressed = false;
      
      // ----- IMPROVED TOUCH / SWIPE SYSTEM (phone optimized) -----
      let isDragging = false;
      let lastTouchX = 0;
      let touchActive = false;
      
      // For smooth inertial feeling we use targetX updated directly from drag delta
      // but also prevent conflicting jumps
      
      // Resize + canvas setup
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (!gameRunning) {
          player.x = canvas.width / 2 - player.width/2;
          player.y = canvas.height - 90;
          targetX = player.x;
        } else {
          // clamp existing position to new boundaries
          player.x = Math.min(Math.max(player.x, 0), canvas.width - player.width);
          targetX = player.x;
        }
      }

      function resetGameState() {
        player = {
          x: canvas.width / 2 - 27,
          y: canvas.height - 90,
          width: 54,
          height: 54
        };
        targetX = player.x;
        objects = [];
        particles = [];
        score = 0;
        
        // Reset speed system
        baseSpeed = 2.6;
        speedLevel = 0;
        currentSpeedMultiplier = 1.0;
        gameStartTime = performance.now() / 1000;

        for (let i = 0; i < 4; i++) {
          spawnObject(true);
        }
      }

      function spawnObject(forceImmediate = false) {
        const baseSize = 36 + Math.floor(Math.random() * 14);
        const size = Math.min(58, baseSize);
        
        const currentBase = baseSpeed + speedLevel;
        const speedBase = (currentBase + Math.random() * 2.2) * currentSpeedMultiplier;
        const finalSpeed = Math.random() < 0.2 ? speedBase * 1.4 : speedBase;
        
        objects.push({
          x: Math.random() * (canvas.width - size),
          y: -size - Math.random() * 30,
          width: size,
          height: size,
          speed: finalSpeed,
          glow: Math.random() * 0.6 + 0.3
        });
      }

      // Update speed based on elapsed time (increase by 1 every 25 seconds)
      function updateSpeedBasedOnTime() {
        if (!gameRunning) return;
        
        const currentTime = performance.now() / 1000;
        const elapsedSeconds = currentTime - gameStartTime;
        
        const newSpeedLevel = Math.floor(elapsedSeconds / SPEED_INCREASE_INTERVAL);
        
        if (newSpeedLevel > speedLevel) {
          speedLevel = newSpeedLevel;
          // visual surge particles
          for (let i = 0; i < 12; i++) {
            particles.push({
              x: player.x + player.width/2,
              y: player.y + player.height/2,
              vx: (Math.random() - 0.5) * 7,
              vy: (Math.random() - 0.5) * 7 - 2,
              life: 1.0,
              size: 4 + Math.random() * 7,
              color: '#ffaa55'
            });
          }
        }
        
        currentSpeedMultiplier = 1.0 + (elapsedSeconds / 180) * 0.3;
      }

      function addExplosion(px, py) {
        for (let i=0; i<14; i++) {
          particles.push({
            x: px, y: py,
            vx: (Math.random()-0.5)*9,
            vy: (Math.random()-0.5)*9 - 2,
            life: 1.0,
            size: 3+Math.random()*7,
            color: `hsl(${15 + Math.random()*40}, 85%, 58%)`
          });
        }
      }

      function updateParticles() {
        for (let i=particles.length-1; i>=0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.life -= 0.018;
          if (p.life <= 0.02 || p.y > canvas.height+50) {
            particles.splice(i,1);
          }
        }
      }

      function updateGame() {
        if (!gameRunning) return;

        score += 0.5;
        updateSpeedBasedOnTime();

        // Keyboard handling
        if (leftPressed) targetX -= 14;
        if (rightPressed) targetX += 14;

        // Clamp target and smooth movement
        targetX = Math.max(2, Math.min(targetX, canvas.width - player.width - 2));
        player.x += (targetX - player.x) * 0.28;

        const elapsed = (performance.now() / 1000) - gameStartTime;
        const spawnChance = 0.022 + (elapsed / 380);
        if (Math.random() < spawnChance) {
          spawnObject();
        }

        // Collision detection with tighter hitbox
        for (let i=0; i<objects.length; i++) {
          const obj = objects[i];
          obj.y += obj.speed;

          if (obj.x < player.x + player.width - 6 &&
              obj.x + obj.width > player.x + 6 &&
              obj.y < player.y + player.height - 8 &&
              obj.y + obj.height > player.y + 8) {
            addExplosion(player.x + player.width/2, player.y + player.height/2);
            setTimeout(() => endGame(), 60);
            return;
          }

          if (obj.y > canvas.height + 120) {
            objects.splice(i,1);
            i--;
          }
        }

        // ambient engine particles for smooth feel
        if (Math.random() < 0.42) {
          particles.push({
            x: player.x + player.width/2 + (Math.random()-0.5)*18,
            y: player.y + player.height-5,
            vx: (Math.random()-0.5)*2.2,
            vy: -1.2 - Math.random()*3.5,
            life: 0.7,
            size: 2+Math.random()*5,
            color: `hsl(190, 88%, 68%)`
          });
        }

        updateParticles();
      }

      function drawGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.width);
        grad.addColorStop(0, '#030b17');
        grad.addColorStop(0.7, '#01030a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // particles
        for (const p of particles) {
          ctx.globalAlpha = p.life * 0.9;
          ctx.fillStyle = p.color || '#88ddff';
          ctx.shadowColor = '#6ef';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.7, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;

        // falling crimson orbs
        for (const obj of objects) {
          const gradient = ctx.createRadialGradient(obj.x+5, obj.y+5, 2, obj.x+obj.width/2, obj.y+obj.height/2, obj.width);
          gradient.addColorStop(0, '#ff4d6d');
          gradient.addColorStop(0.8, '#b00020');
          ctx.fillStyle = gradient;
          ctx.shadowColor = '#ff3b4a';
          ctx.shadowBlur = 22;
          ctx.beginPath();
          ctx.roundRect(obj.x, obj.y, obj.width, obj.height, 10);
          ctx.fill();
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#ff8a9a';
          ctx.globalAlpha = 0.35;
          ctx.beginPath();
          ctx.roundRect(obj.x+3, obj.y+3, obj.width-6, obj.height-6, 6);
          ctx.fill();
          ctx.globalAlpha = 1.0;
        }

        // player core shield & glimmer
        ctx.shadowColor = '#0cf';
        ctx.shadowBlur = 32;
        ctx.fillStyle = '#48d8ff';
        ctx.beginPath();
        ctx.roundRect(player.x-2, player.y-2, player.width+4, player.height+4, 14);
        ctx.fill();
        ctx.shadowBlur = 24;
        const playerGrad = ctx.createLinearGradient(player.x, player.y, player.x+player.width, player.y+player.height);
        playerGrad.addColorStop(0, '#a0e0ff');
        playerGrad.addColorStop(0.6, '#1e90ff');
        ctx.fillStyle = playerGrad;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 12);
        ctx.fill();
        ctx.shadowBlur = 28;
        ctx.fillStyle = '#e0f3ff';
        ctx.beginPath();
        ctx.roundRect(player.x+6, player.y+6, player.width-12, player.height-12, 8);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';

        // Score display
        ctx.font = 'bold 34px "Orbitron", "Segoe UI", sans-serif';
        ctx.fillStyle = '#FFE28C';
        ctx.shadowColor = '#f90';
        ctx.shadowBlur = 20;
        ctx.fillText(`⚡${Math.floor(score)}`, 24, 68);
        ctx.shadowBlur = 0;
        
        // Speed & timer HUD
        const currentTime = performance.now() / 1000;
        const elapsed = gameRunning ? currentTime - gameStartTime : 0;
        const nextSpeedIn = SPEED_INCREASE_INTERVAL - (elapsed % SPEED_INCREASE_INTERVAL);
        
        ctx.font = '16px "Orbitron", monospace';
        ctx.fillStyle = '#aad0ff';
        ctx.fillText(`SPEED +${speedLevel}`, canvas.width-150, 48);
        ctx.fillText(`NEXT +1 in ${nextSpeedIn.toFixed(1)}s`, canvas.width-210, 78);
        ctx.fillStyle = '#ffb347';
        ctx.font = '14px "Orbitron"';
        ctx.fillText(`⚡ ${(baseSpeed + speedLevel).toFixed(1)}`, canvas.width-110, 108);
      }

      function gameLoop() {
        if (!gameRunning) return;
        updateGame();
        drawGame();
        animationId = requestAnimationFrame(gameLoop);
      }

      // ----- ENHANCED TOUCH/SWIPE LOGIC (works beautifully on phones) -----
      function initTouchControls() {
        // Touch start: begins drag and records initial position, also prevents page scroll
        canvas.addEventListener('touchstart', (e) => {
          if (!gameRunning) return;
          e.preventDefault();
          const touch = e.touches[0];
          isDragging = true;
          touchActive = true;
          lastTouchX = touch.clientX;
          // optional: set targetX to current player.x for consistent delta
          targetX = player.x;
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
          if (!gameRunning || !isDragging) return;
          e.preventDefault();
          const touch = e.touches[0];
          const deltaX = touch.clientX - lastTouchX;
          if (deltaX !== 0) {
            // Adjust target position with sensitivity 1.2 (smooth, fast swipe)
            targetX += deltaX * 1.2;
            // Clamp edges
            targetX = Math.max(0, Math.min(targetX, canvas.width - player.width));
            lastTouchX = touch.clientX;
          }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
          if (!gameRunning) return;
          e.preventDefault();
          isDragging = false;
          touchActive = false;
        });
        
        // Mouse support for debugging and desktop dragging (same as swipe)
        canvas.addEventListener('mousedown', (e) => {
          if (!gameRunning) return;
          e.preventDefault();
          isDragging = true;
          lastTouchX = e.clientX;
          targetX = player.x;
        });
        
        window.addEventListener('mousemove', (e) => {
          if (!gameRunning || !isDragging) return;
          e.preventDefault();
          const deltaX = e.clientX - lastTouchX;
          if (deltaX !== 0) {
            targetX += deltaX * 1.2;
            targetX = Math.max(0, Math.min(targetX, canvas.width - player.width));
            lastTouchX = e.clientX;
          }
        });
        
        window.addEventListener('mouseup', () => {
          isDragging = false;
        });
        
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      }
      
      function startGame() {
        if (animationId) cancelAnimationFrame(animationId);
        menuDiv.style.display = 'none';
        gameOverDiv.style.display = 'none';
        canvas.style.display = 'block';
        
        hintLeft.style.display = 'block';
        hintRight.style.display = 'block';
        hintRight.style.opacity = '1';
        
        resizeCanvas();
        resetGameState();
        gameRunning = true;
        
        gameStartTime = performance.now() / 1000;
        
        leftPressed = false;
        rightPressed = false;
        isDragging = false;
        touchActive = false;
        
        gameLoop();
      }

      function restartGame() {
        startGame();
      }

      function returnToMainMenu() {
        cancelAnimationFrame(animationId);
        gameRunning = false;
        canvas.style.display = 'none';
        gameOverDiv.style.display = 'none';
        menuDiv.style.display = 'flex';
        hintLeft.style.display = 'none';
        hintRight.style.display = 'none';
        leftPressed = false;
        rightPressed = false;
        isDragging = false;
      }

      function endGame() {
        if (!gameRunning) return;
        gameRunning = false;
        cancelAnimationFrame(animationId);
        
        addExplosion(player.x+player.width/2, player.y+player.height/2);
        drawGame();  // final freeze frame with explosion
        
        canvas.style.display = 'none';
        gameOverDiv.style.display = 'flex';
        
        const elapsed = (performance.now() / 1000) - gameStartTime;
        finalScoreSpan.textContent = `🏆 ${Math.floor(score)} · SPEED +${speedLevel} · ${elapsed.toFixed(1)}s 🏆`;
        
        hintLeft.style.display = 'none';
        hintRight.style.display = 'none';
        
        leftPressed = false;
        rightPressed = false;
        isDragging = false;
      }

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          if (w < 2 * r) r = w / 2;
          if (h < 2 * r) r = h / 2;
          this.moveTo(x + r, y);
          this.arcTo(x + w, y, x + w, y + h, r);
          this.arcTo(x + w, y + h, x, y + h, r);
          this.arcTo(x, y + h, x, y, r);
          this.arcTo(x, y, x + w, y, r);
          return this;
        };
      }

      // Keyboard listeners
      window.addEventListener('keydown', e => {
        if (!gameRunning) return;
        if (e.key === 'ArrowLeft') {
          leftPressed = true;
          e.preventDefault();
        } else if (e.key === 'ArrowRight') {
          rightPressed = true;
          e.preventDefault();
        }
      });
      
      window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft') {
          leftPressed = false;
          e.preventDefault();
        } else if (e.key === 'ArrowRight') {
          rightPressed = false;
          e.preventDefault();
        }
      });

      // Window resize adapt
      window.addEventListener('resize', () => {
        resizeCanvas();
        if (gameRunning) {
          targetX = Math.min(Math.max(targetX, 0), canvas.width - player.width);
          player.x = Math.min(Math.max(player.x, 0), canvas.width - player.width);
        }
      });

      // Initialize game controls and touch
      initTouchControls();
      
      startBtn.onclick = startGame;
      restartBtn.onclick = restartGame;
      mainMenuBtn.onclick = returnToMainMenu;

      resizeCanvas();
      hintLeft.style.display = 'none';
      hintRight.style.display = 'none';
      
      window.addEventListener('blur', () => {
        leftPressed = false;
        rightPressed = false;
        isDragging = false;
      });
    })();
  </script>
</body>
</html>
